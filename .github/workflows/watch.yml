name: CROUS Compiegne Watcher

on:
  workflow_dispatch: {}  # triggered externally every 5 minutes by cron-job.org

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run watcher
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: python crous_compiegne_watcher.py

      - name: Commit updated state file (if changed)
        run: |
          git config user.name "crous-watcher-bot"
          git config user.email "actions@github.com"
          git add crous_compiegne_seen.json
          git diff --staged --quiet || git commit -m "Update seen listings [skip ci]"
          git pull --rebase origin main || true
          git push
